---
# The Classic Ingress resource (networking.k8s.io/v1)
#
# Problems with this approach:
#   - All config lives in annotations (not typed, not validated)
#   - nginx-specific annotations don't work on other controllers
#   - No role separation
#   - Limited expressiveness (no traffic splitting, no header manipulation natively)
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  annotations:
    # These annotations are nginx-specific — not portable!
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: demo.local
      http:
        paths:
          - path: /app1(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: app1-svc
                port:
                  number: 80
          - path: /app2(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: app2-svc
                port:
                  number: 80
