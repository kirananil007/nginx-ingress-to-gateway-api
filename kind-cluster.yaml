kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: nginx-to-gateway
nodes:
  - role: control-plane
    # Required for ingress-nginx kind deployment (uses hostNetwork)
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Used by ingress-nginx (hostNetwork binds directly to node ports)
      - containerPort: 80
        hostPort: 18080
        protocol: TCP
      - containerPort: 443
        hostPort: 18443
        protocol: TCP
      # Used by Envoy Gateway (NodePort)
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
